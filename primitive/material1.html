<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Include the CesiumJS JavaScript and CSS files -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.138/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.138/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    /* Set the container to fill the entire page */
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script type="module">
    // Your access token can be found at: https://ion.cesium.com/tokens.
    // This is the default access token from your ion account

    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4M2ZhYzM4My1lN2NhLTRjNTktODY1OC1jZDdmOTU3Y2ZjMGEiLCJpZCI6MTMwNTAsInNjb3BlcyI6WyJhc3IiLCJnYyJdLCJpYXQiOjE1NjI0NzA5NzB9.rRTs6chsWJdo9KNYe5VjJj2fUzMHeniIJvFQOd0aLJU';

    // Initialize the Cesium Viewer in the HTML element with the `cesiumContainer` ID.
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
    });

    // 1) 同一个 Geometry：一个带 position/normal/st 的立方体
    const sharedGeometry = Cesium.BoxGeometry.fromDimensions({
      vertexFormat: Cesium.VertexFormat.POSITION_NORMAL_AND_ST,
      dimensions: new Cesium.Cartesian3(4000.0, 4000.0, 4000.0),
    });

    // 2) 基准位置（北京上空）
    const basePosition = Cesium.Cartesian3.fromDegrees(116.391, 39.907, 6000.0);
    const enuFrame = Cesium.Transforms.eastNorthUpToFixedFrame(basePosition);

    // 左右平移，让两个 Primitive 分开展示
    const leftModelMatrix = Cesium.Matrix4.multiplyByTranslation(
      enuFrame,
      new Cesium.Cartesian3(-5000.0, 0.0, 0.0),
      new Cesium.Matrix4(),
    );
    const rightModelMatrix = Cesium.Matrix4.multiplyByTranslation(
      enuFrame,
      new Cesium.Cartesian3(5000.0, 0.0, 0.0),
      new Cesium.Matrix4(),
    );

    // A. GeometryInstance + PerInstanceColorAppearance
    const colorInstance = new Cesium.GeometryInstance({
      geometry: sharedGeometry,
      modelMatrix: leftModelMatrix,
      id: 'color-box',
      attributes: {
        color: Cesium.ColorGeometryInstanceAttribute.fromColor(
          Cesium.Color.ORANGE.withAlpha(0.85),
        ),
      },
    });

    const colorPrimitive = viewer.scene.primitives.add(
      new Cesium.Primitive({
        geometryInstances: colorInstance,
        appearance: new Cesium.PerInstanceColorAppearance({
          translucent: true,
          closed: true,
        }),
      }),
    );

    // B. 同一个 Geometry + MaterialAppearance
    const materialInstance = new Cesium.GeometryInstance({
      geometry: sharedGeometry,
      modelMatrix: rightModelMatrix,
      id: 'material-box',
    });

    const materialPrimitive = viewer.scene.primitives.add(
      new Cesium.Primitive({
        geometryInstances: materialInstance,
        appearance: new Cesium.MaterialAppearance({
          translucent: true,
          closed: true,
          material: new Cesium.Material({
            fabric:{
              type: "Image",
              uniforms: {
                image: "/satellite.jpg",
              }
            }
          })
        }),
      }),
    );
   
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(116.391, 39.907, 22000.0),
      duration: 1.5,
    });

  </script>
</body>
</html>
