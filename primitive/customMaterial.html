<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Include the CesiumJS JavaScript and CSS files -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.138/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.138/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <style>
      /* Set the container to fill the entire page */
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <script type="module">
      // Your access token can be found at: https://ion.cesium.com/tokens.
      // This is the default access token from your ion account

      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4M2ZhYzM4My1lN2NhLTRjNTktODY1OC1jZDdmOTU3Y2ZjMGEiLCJpZCI6MTMwNTAsInNjb3BlcyI6WyJhc3IiLCJnYyJdLCJpYXQiOjE1NjI0NzA5NzB9.rRTs6chsWJdo9KNYe5VjJj2fUzMHeniIJvFQOd0aLJU";

      // Initialize the Cesium Viewer in the HTML element with the `cesiumContainer` ID.
      const viewer = new Cesium.Viewer("cesiumContainer", {
        terrain: Cesium.Terrain.fromWorldTerrain(),
      });

      const shaderSource = `
      uniform vec4 color;
      
      czm_material czm_getMaterial(czm_materialInput materialInput)
      {
        vec4 outColor = color;
        czm_material material = czm_getDefaultMaterial(materialInput);
        float time = czm_frameNumber / 60.0;
        material.diffuse = czm_gammaCorrect(outColor.rgb * abs(sin(time)));
        material.alpha = outColor.a;
        return material;
      }
    `;

      const myMaterial = new Cesium.Material({
        translucent: false,
        fabric: {
          type: "test",
          uniforms: {
            color: new Cesium.Color(1, 0, 0, 1),
          },
          source: shaderSource,
        },
      });

      const appearance = new Cesium.MaterialAppearance({
        material: myMaterial,
      });

      const polylineAppearance = new Cesium.PolylineMaterialAppearance({
        material: myMaterial,
      });

      const polygonPrimitive = new Cesium.Primitive({
        geometryInstances: new Cesium.GeometryInstance({
          geometry: new Cesium.PolygonGeometry({
            polygonHierarchy: new Cesium.PolygonHierarchy(
              Cesium.Cartesian3.fromDegreesArray([
                114, 25, 114.01, 25, 114.01, 25.01, 114, 25.01,
              ]),
            ),
            height: 1000,
          }),
        }),
        appearance,
      });

      const boxPrimitive = new Cesium.Primitive({
        geometryInstances: new Cesium.GeometryInstance({
          geometry: Cesium.BoxGeometry.fromDimensions({
            vertexFormat: Cesium.MaterialAppearance.MaterialSupport.BASIC.vertexFormat,
            dimensions: new Cesium.Cartesian3(1000, 1000, 1000),
          }),
          modelMatrix: Cesium.Transforms.eastNorthUpToFixedFrame(
            Cesium.Cartesian3.fromDegrees(114.005, 25.02, 1000),
          ),
        }),
        appearance: appearance
      });

      const polylinePrimitive = new Cesium.Primitive({
        geometryInstances: new Cesium.GeometryInstance({
          geometry: new Cesium.PolylineGeometry({
            positions: Cesium.Cartesian3.fromDegreesArrayHeights([
              114.02, 25.02, 1000, 114.05, 25.02, 1000,
            ]),
            width: 2,
          }),
        }),
        appearance: polylineAppearance,
      });

      const ellipsoidPrimitive = new Cesium.Primitive({
        geometryInstances: new Cesium.GeometryInstance({
          geometry: new Cesium.EllipsoidGeometry({
            radii: new Cesium.Cartesian3(1000, 1000, 1000),
          }),
          modelMatrix: Cesium.Transforms.eastNorthUpToFixedFrame(
            Cesium.Cartesian3.fromDegrees(114.03, 25.005, 1000),
          ),
        }),
        appearance: appearance
      });

      viewer.scene.primitives.add(polygonPrimitive);
      viewer.scene.primitives.add(boxPrimitive);
      viewer.scene.primitives.add(polylinePrimitive);
      viewer.scene.primitives.add(ellipsoidPrimitive);

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(114.02, 25.01, 10000),
        duration: 0,
      });

    </script>
  </body>
</html>
